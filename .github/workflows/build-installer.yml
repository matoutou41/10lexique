name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Permet de déclencher manuellement depuis GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: python make_icon.py

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name 10Lexique `
            --icon assets/icon.ico `
            --add-data "assets/icon.png;assets" `
            --add-data "assets/icon.ico;assets" `
            --hidden-import pystray._win32 `
            --hidden-import PIL._tkinter_finder `
            --hidden-import plyer.platforms.win.notification `
            --collect-all anthropic `
            --collect-all google `
            --collect-all google.genai `
            --collect-all customtkinter `
            --clean `
            --noconfirm `
            src/main.py

      - name: Verify EXE
        run: |
          if (-not (Test-Path "dist/10Lexique.exe")) {
            Write-Error "L'EXE n'a pas été généré"
            exit 1
          }
          Write-Host "EXE généré : $((Get-Item dist/10Lexique.exe).Length) bytes"

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Verify installer
        run: |
          $installer = Get-ChildItem "installer_output\*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "L'installateur n'a pas été généré"
            exit 1
          }
          Write-Host "Installateur : $($installer.Name) ($($installer.Length) bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 10Lexique-installer
          path: |
            dist/10Lexique.exe
            installer_output/*.exe

      - name: Create Release (sur tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/*.exe
            dist/10Lexique.exe
          generate_release_notes: false
          name: 10Lexique ${{ github.ref_name }}
          body: |
            ## Téléchargement

            **Pour installer 10Lexique sur votre PC Windows :**

            Téléchargez `10Lexique-Setup-1.0.0.exe` ci-dessous et double-cliquez dessus.

            ### Fichiers
            - `10Lexique-Setup-X.Y.Z.exe` — Installateur Windows complet (recommandé)
            - `10Lexique.exe` — Version portable (pas d'installation)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
